services:
  postgres:
    image: postgres:16
    container_name: sistema_eleitoral_db
    environment:
      POSTGRES_DB: elections
      POSTGRES_USER: elections
      POSTGRES_PASSWORD: elections
    ports:
      - "5432:5432"
    volumes:
      - ./backend/src/main/resources/db:/docker-entrypoint-initdb.d

  backend:
    image: sbtscala/scala-sbt:eclipse-temurin-21.0.6_7_1.10.10_3.6.4
    container_name: sistema_eleitoral_backend
    working_dir: /app/backend
    command: sbt run
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/elections
      DB_USER: elections
      DB_PASSWORD: elections
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    volumes:
      - ./:/app
